services:
  - type: web
    name: luna-backend
    runtime: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LUNA_DB_MODE
        value: auto
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: luna
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LUNA_ADMIN_EMAILS
        value: seiuasatou@gmail.com,sandeepdatta866@gmail.com
      - key: LUNA_FREE_DAILY_LIMIT
        value: "100"
      - key: LUNA_PRO_PRICE_INR
        value: "90"
      - key: LUNA_PRO_UPI_ID
        value: 9366183700@fam
